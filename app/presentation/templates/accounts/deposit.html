{% extends "layout.html" %}

{% block content %}
<div class="card shadow mx-auto" style="max-width: 400px;">
    <div class="card-header bg-success text-white"><h5>💰 Поповнення картки</h5></div>
    <div class="card-body">
        <p>Рахунок: <strong>{{ account.card_number }}</strong></p>
        <p>Поточний баланс: <strong>{{ account.balance }} ₴</strong></p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Сума поповнення</label>
                <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success w-100">Поповнити баланс</button>
                <a href="{{ url_for('account.list_accounts') }}" class="btn btn-outline-secondary">Скасувати</a>
            </div>
            
        </form>
        
    </div>
</div>
{% endblock %}
