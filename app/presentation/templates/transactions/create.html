{% extends "layout.html" %}

{% block content %}
<div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-header bg-dark text-white"><h4>💸 Нова транзакція</h4></div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Тип операції</label>
                <select name="type" id="txType" class="form-select" onchange="toggleFields()">
                    <option value="transfer">Внутрішній переказ</option>
                    <option value="payment">Оплата послуг (Payment)</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Відправник</label>
                    <select name="sender_account_id" class="form-select">
                        {% for acc in accounts %}
                            <option value="{{ acc.id }}">{{ acc.card_number }} ({{ acc.balance }} ₴)</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Отримувач</label>
                    <select name="receiver_account_id" class="form-select">
                        {% for acc in accounts %}
                            <option value="{{ acc.id }}">{{ acc.card_number }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Сума</label>
                <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>

            <div id="paymentFields" style="display: none;" class="p-3 bg-light border rounded mb-3">
                <div class="mb-2">
                    <label class="form-label">Назва магазину</label>
                    <input type="text" name="merchant_name" class="form-control">
                </div>
                <div class="mb-2">
                    <label class="form-label">Категорія</label>
                    <input type="text" name="category" class="form-control" placeholder="Food, Transport...">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Підтвердити</button>
        </form>
    </div>
</div>

<script>
function toggleFields() {
    const type = document.getElementById('txType').value;
    document.getElementById('paymentFields').style.display = type === 'payment' ? 'block' : 'none';
}
</script>
{% endblock %}
